<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Speed Violation Detector - Real-time speed monitoring with route planning, live weather, and ML-powered violation alerts. 3D animated interface." />
  <title>Speed Violation Detector — 3D Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <!-- Three.js for 3D particles -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

  <!-- ═══════════════ VIOLATION ALERT BAR ═══════════════ -->
  <div id="violation-alert" class="violation-alert hidden">
    <div class="violation-icon">🚨</div>
    <div class="violation-text">
      <span id="violation-message">Speed limit exceeded!</span>
    </div>
    <button id="violation-close" class="violation-close">&times;</button>
  </div>

  <!-- ═══════════════ MAIN LAYOUT ═══════════════ -->
  <div class="app-container">

    <!-- ─── SIDEBAR ─── -->
    <aside class="sidebar" id="sidebar">
      <!-- Logo -->
      <div class="logo-section">
        <div class="logo-icon">
          <svg viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="18" stroke="url(#logoGrad)" stroke-width="3" />
            <path d="M20 6 L23 17 L34 17 L25 24 L28 35 L20 28 L12 35 L15 24 L6 17 L17 17 Z" fill="url(#logoGrad)"
              opacity="0.85" />
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40">
                <stop offset="0%" stop-color="#00f5ff" />
                <stop offset="100%" stop-color="#a855f7" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <h1 class="logo-title">Speed Violation</h1>
          <p class="logo-subtitle">Detector</p>
        </div>
      </div>

      <!-- Route Input -->
      <div class="panel route-panel">
        <h2 class="panel-title">
          <span class="panel-icon">📍</span> Route Planner
        </h2>

        <div class="input-group">
          <label for="source-input">Source</label>
          <div class="input-wrapper">
            <input type="text" id="source-input" placeholder="Enter starting point..." autocomplete="off" />
            <button id="source-location-btn" class="location-btn" title="Use my location">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3" />
                <path d="M12 2v4M12 18v4M2 12h4M18 12h4" />
                <circle cx="12" cy="12" r="8" stroke-dasharray="4 4" />
              </svg>
            </button>
          </div>
          <ul id="source-suggestions" class="suggestions hidden"></ul>
        </div>

        <div class="route-connector">
          <div class="connector-line"></div>
          <div class="connector-dot"></div>
          <div class="connector-line"></div>
        </div>

        <div class="input-group">
          <label for="dest-input">Destination</label>
          <div class="input-wrapper">
            <input type="text" id="dest-input" placeholder="Enter destination..." autocomplete="off" />
          </div>
          <ul id="dest-suggestions" class="suggestions hidden"></ul>
        </div>

        <button id="find-route-btn" class="btn btn-primary" disabled>
          <span class="btn-icon">🗺️</span> Find Route
        </button>

        <div class="demo-section">
          <p class="demo-label">Or try a demo route:</p>
          <div class="demo-buttons">
            <button class="btn-demo" data-source="Delhi" data-source-lat="28.6139" data-source-lng="77.2090"
              data-dest="Jaipur" data-dest-lat="26.9124" data-dest-lng="75.7873">Delhi → Jaipur</button>
            <button class="btn-demo" data-source="Mumbai" data-source-lat="19.0760" data-source-lng="72.8777"
              data-dest="Pune" data-dest-lat="18.5204" data-dest-lng="73.8567">Mumbai → Pune</button>
            <button class="btn-demo" data-source="Bangalore" data-source-lat="12.9716" data-source-lng="77.5946"
              data-dest="Mysore" data-dest-lat="12.2958" data-dest-lng="76.6394">Bangalore → Mysore</button>
          </div>
        </div>
      </div>

      <!-- Route Info -->
      <div id="route-info" class="panel route-info hidden">
        <h2 class="panel-title"><span class="panel-icon">📊</span> Route Details</h2>
        <div class="info-grid">
          <div class="info-card">
            <span class="info-label">Distance</span>
            <span class="info-value" id="route-distance">--</span>
          </div>
          <div class="info-card">
            <span class="info-label">Duration</span>
            <span class="info-value" id="route-duration">--</span>
          </div>
        </div>
      </div>

      <!-- Speed Gauge -->
      <div id="speed-section" class="panel speed-panel hidden">
        <h2 class="panel-title"><span class="panel-icon">⚡</span> Speed Monitor</h2>
        <div class="gauge-container">
          <div class="gauge" id="speed-gauge">
            <svg viewBox="0 0 200 120" class="gauge-svg">
              <path d="M 20 110 A 80 80 0 0 1 180 110" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="14"
                stroke-linecap="round" />
              <path id="gauge-fill" d="M 20 110 A 80 80 0 0 1 180 110" fill="none" stroke="url(#gaugeGrad3D)"
                stroke-width="14" stroke-linecap="round" stroke-dasharray="251.2" stroke-dashoffset="251.2"
                style="filter: drop-shadow(0 0 8px rgba(0, 245, 255, 0.3))" />
              <defs>
                <linearGradient id="gaugeGrad3D" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#10b981" />
                  <stop offset="40%" stop-color="#00f5ff" />
                  <stop offset="70%" stop-color="#f59e0b" />
                  <stop offset="100%" stop-color="#ef4444" />
                </linearGradient>
              </defs>
            </svg>
            <div class="gauge-value">
              <span id="current-speed-value">0</span>
              <span class="gauge-unit">km/h</span>
            </div>
          </div>
          <div class="speed-limit-display">
            <span class="limit-label">Speed Limit</span>
            <div class="limit-sign" id="speed-limit-sign">
              <span id="speed-limit-value">--</span>
            </div>
          </div>
        </div>
        <div class="drive-buttons">
          <button id="simulate-btn" class="btn btn-simulate">
            <span class="btn-icon">🚗</span> Simulate Drive
          </button>
          <button id="live-track-btn" class="btn btn-live-track">
            <span class="btn-icon">📡</span> Live Track
          </button>
        </div>
        <button id="stop-sim-btn" class="btn btn-stop hidden">
          <span class="btn-icon">⏹️</span> Stop Simulation
        </button>
        <button id="stop-track-btn" class="btn btn-stop hidden">
          <span class="btn-icon">⏹️</span> Stop Tracking
        </button>
      </div>

      <!-- Weather -->
      <div id="weather-section" class="panel weather-panel hidden">
        <h2 class="panel-title"><span class="panel-icon">🌤️</span> Route Weather</h2>
        <div id="weather-cards" class="weather-cards"></div>
      </div>
    </aside>

    <!-- ─── MAP ─── -->
    <main class="map-container">
      <!-- 3D Particle Background -->
      <div id="three-bg"></div>
      <!-- Map -->
      <div id="map"></div>
      <!-- Floating Speed Badge -->
      <div id="floating-speed" class="floating-speed hidden">
        <div class="floating-speed-value" id="floating-speed-value">0</div>
        <div class="floating-speed-unit">km/h</div>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
